<html>
    <head>
        <title>Change Paragraph Style</title>
    </head>
<body>
    <p id="p1">This is Paragraph</p>
    <p id="p2">This is Paragraph</p>
    <p id="p3">This is Paragraph</p>
    <p id="p4">This is Paragraph</p>    
    <div class="controls">
        <label for="colorpicker">Choose Color</label>
        <input type="color" id="c1" value="#000000"/>
        <button onclick="changeParagraphStyle()">Apply Color</button> 
    </div>
    <script>
        function changeParagraphStyle()
        {
            let color = document.getElementById("c1").value;
            document.getElementById("p1").style.color=color;
            document.getElementById("p1").style.fontWeight="bold";

            document.getElementById("p2").style.color=color;
            document.getElementById("p2").style.fontWeight="bold";

            document.getElementById("p3").style.color=color;
            document.getElementById("p3").style.fontWeight="bold";

            document.getElementById("p4").style.color=color;
            document.getElementById("p4").style.fontWeight="bold";

        }
    </script>
</body>
</html>
