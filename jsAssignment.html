<html>

<head>
</head>

<body>

<div id="p1">Data</div>

<br><br>

<!-- Input from user -->
Enter a Number :
<input type="number" id="num" required>

<button onclick="findSquare()">Find Square</button>

<div id="result"></div>

<script type="text/javascript">

var a = 10;
var val;

for(var i=1;i<=10;i++){
    val = a*i;
    document.getElementById("p1").innerText += "\n" + val+"\n";
}

for(var i=1;i<=4;i++)
{
    for(var j=4;j>=i;j--)
    {
        document.getElementById("p1").innerText += "*";
    }
    document.getElementById("p1").innerText += "\n";
}

function findSquare()
{
    var n = document.getElementById("num").value;

    if(n == "")
    {
        alert("Please enter a number");
        return;
    }

    var square = n * n;

    document.getElementById("result").innerHTML =
    "Square of " + n + " is : " + square;
}

</script>

</body>

</html>
