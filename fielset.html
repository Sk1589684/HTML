<html>
    <head>
        <title>Fieldset</title>
    </head>
    <body>
        <form>
            <fieldset>
                <legend>Personal Details</legend>
                    Name: 
                    <input type:"text" name="name" required><br></br>

                    Phone:
                    <input type="number" pattern="[0-9]" placeholder="10-digits number" required><br></br>
            </fieldset>
            <fieldset>
                Password:
                    <input type="password" minlength="6" required><br></br>
            </fieldset>
            <button>
                <input type="submit" required>
            </button>
        </form>
    </body>
</html>
